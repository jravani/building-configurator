name: Add to organisation project

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

jobs:
  add-to-project:
    # Skip raw [Feedback] issues — they are closed and superseded by a refined
    # [Issue] which gets added to the project directly by refine-feedback.yml.
    if: "!startsWith(github.event.issue.title, '[Feedback]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/THD-Spatial-AI/projects/7
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
